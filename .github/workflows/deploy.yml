name: Deploy theme to Bluehost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bluehost-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Rsync theme to Bluehost
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr --delete
            --exclude='.git/'
            --exclude='.github/'
            --exclude='.gitignore'
            --exclude='README.md'
            --exclude='*.md'
            --exclude='.DS_Store'
          path: ./
          remote_path: ~/public_html/wp-content/themes/ETC-theme/
          remote_host: ${{ secrets.BLUEHOST_HOST }}
          remote_port: 22
          remote_user: ${{ secrets.BLUEHOST_USER }}
          remote_key: ${{ secrets.BLUEHOST_SSH_KEY }}
